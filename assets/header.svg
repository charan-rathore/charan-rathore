<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="50%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" filter="url(#noise)" opacity="0.3"/>
  
  <!-- Animated particles -->
  <circle cx="100" cy="50" r="1.5" fill="#00d2ff" opacity="0.6">
    <animate attributeName="cy" values="50;150;50" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="150" r="1" fill="#7b68ee" opacity="0.4">
    <animate attributeName="cy" values="150;30;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="80" r="2" fill="#ff6b9d" opacity="0.5">
    <animate attributeName="cy" values="80;170;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="120" r="1.5" fill="#00d2ff" opacity="0.3">
    <animate attributeName="cy" values="120;40;120" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="60" r="1" fill="#7b68ee" opacity="0.5">
    <animate attributeName="cy" values="60;160;60" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="140" r="1.5" fill="#ff6b9d" opacity="0.4">
    <animate attributeName="cy" values="140;20;140" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Grid lines -->
  <line x1="0" y1="199" x2="900" y2="199" stroke="#7b68ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="0" x2="900" y2="0" stroke="#00d2ff" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Main text -->
  <text x="450" y="85" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    Charan Rathore
  </text>
  
  <!-- Subtitle with typing animation -->
  <text x="450" y="125" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" fill="#a0a0b8" letter-spacing="2">
    AI/ML Engineer  ·  Systems Builder  ·  BITS Pilani
  </text>
  
  <!-- Animated underline -->
  <rect x="200" y="145" width="0" height="2" rx="1" fill="url(#textGrad)">
    <animate attributeName="width" values="0;500;500;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="450;200;200;450" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Bottom decorative line -->
  <line x1="0" y1="198" x2="0" y2="198" stroke="url(#textGrad)" stroke-width="2">
    <animate attributeName="x2" values="0;900;900;0" dur="6s" repeatCount="indefinite"/>
  </line>
</svg>
